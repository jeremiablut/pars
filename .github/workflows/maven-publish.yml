name: Build Windows EXE

on:
  push:
    branches: [ master, main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package

      - name: Prepare Packaging Directory
        run: |
          mkdir target\jpackage-input
          copy target\pars-1.0-SNAPSHOT.jar target\jpackage-input\
          mvn dependency:copy-dependencies -DoutputDirectory=target/jpackage-input/libs

      - name: Create EXE with jpackage
        run: |
          jpackage `
            --name "ParsarApp" `
            --app-version "1.0.0" `
            --input target/jpackage-input `
            --main-jar pars-1.0-SNAPSHOT.jar `
            --main-class com.parser.pars.ParsarApplication `
            --type exe `
            --dest dist `
            --win-dir-chooser `
            --win-shortcut `
            --win-menu `
            --java-options "--enable-preview" `
            --module-path "target/jpackage-input/libs" `
            --add-modules javafx.controls,javafx.fxml,javafx.web,javafx.media,javafx.swing

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ParsarApp-Windows-EXE
          path: dist/*.exe
